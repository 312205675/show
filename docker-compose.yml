version: "3.8"

services:
  smartestate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartestate-web
    ports:
      - "80:80"
    restart: always
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 挂载 nginx 日志到宿主机，方便排查问题
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx-logs:
